# Best-effort anti-abuse limits
limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Cache para SmartOLT (reduce carga al upstream)
proxy_cache_path /var/cache/nginx/smartolt levels=1:2 keys_zone=smartolt_cache:10m max_size=100m inactive=24h use_temp_path=off;

server {
  listen 80;
  server_name _;

  # NOTE: test root, keeps test build isolated inside the image
  root /usr/share/nginx/html-test;
  index index.html;

  server_tokens off;
  add_header X-XSS-Protection "1; mode=block" always;
  limit_req_status 429;
  limit_conn_status 429;
  limit_conn conn_per_ip 20;

  client_header_timeout 10s;
  client_body_timeout 10s;
  send_timeout 10s;
  keepalive_timeout 15s;
  reset_timedout_connection on;

  large_client_header_buffers 4 8k;
  client_max_body_size 50m;

  resolver 127.0.0.11 valid=10s ipv6=off;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://geonet.cl https://maps.gstatic.com https://maps.googleapis.com https://cdn.jsdelivr.net; connect-src 'self' https://maps.googleapis.com https://www.googleapis.com https://ipapi.co; font-src 'self' https://fonts.gstatic.com data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" always;
  }

  location / {
    limit_req zone=req_per_ip burst=30 nodelay;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://geonet.cl https://maps.gstatic.com https://maps.googleapis.com https://cdn.jsdelivr.net; connect-src 'self' https://maps.googleapis.com https://www.googleapis.com https://ipapi.co; font-src 'self' https://fonts.gstatic.com data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" always;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    limit_req zone=req_per_ip burst=120 nodelay;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://geonet.cl https://maps.gstatic.com https://maps.googleapis.com https://cdn.jsdelivr.net; connect-src 'self' https://maps.googleapis.com https://www.googleapis.com https://ipapi.co; font-src 'self' https://fonts.gstatic.com data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" always;

    try_files $uri =404;
  }

  location = /api/smartolt/odbs {
    limit_req zone=req_per_ip burst=40 nodelay;
    set $smartolt_skip_cache 0;
    if ($arg_refresh = 1) { set $smartolt_skip_cache 1; }
    if ($http_cache_control ~* "no-cache|no-store|max-age=0") { set $smartolt_skip_cache 1; }
    proxy_cache smartolt_cache;
    proxy_cache_key "$scheme$proxy_host$request_uri";
    proxy_cache_valid 200 24h;
    proxy_cache_valid 404 10m;
    proxy_cache_bypass $smartolt_skip_cache;
    proxy_no_cache $smartolt_skip_cache;
    proxy_cache_lock on;
    proxy_cache_background_update on;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
    add_header X-Cache-Status $upstream_cache_status always;
    proxy_pass __SMARTOLT_GET_ODBS_URL__;
    proxy_set_header X-Token "__SMARTOLT_X_TOKEN__";
    proxy_set_header Accept "application/json";
    proxy_set_header Host $proxy_host;
    proxy_ssl_server_name on;
    proxy_connect_timeout 6s;
    proxy_send_timeout 20s;
    proxy_read_timeout 20s;
  }

  location /api/ {
      return 403;
  }

  location ~ ^/api/(installations) {
    limit_req zone=req_per_ip burst=60 nodelay;
    if ($http_sec_fetch_mode = "navigate") {
        return 301 https://instalaciones.geonet.cl/;
    }
    proxy_hide_header Strict-Transport-Security;
    set $api_upstream http://api:3000;
    rewrite ^/api/(.*) /$1 break;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }
}
